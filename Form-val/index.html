<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <!-- 1. Bootstrap CSS first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 2. Your custom CSS afterwards -->
    <link rel="stylesheet" href="./Assets/CSS/style.css">
</head>

<body>

    <div class="container">
        <div class="form-section">
            <h2 class="form-title text-center text-primary fw-bold my-4 fs-1 text-white">Form Validation</h2>
            <form action="" id="form">
                <div class="row">
                    <!-------- Name -------->
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="name">Name:</label>
                            <input type="text" id="name" class="form-control" name="name">
                        </div>
                    </div>
                    <!-------- Email -------->
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="email">Email:</label>
                            <input type="email" id="email" class="form-control" name="email">
                        </div>
                    </div>
                    <!-------- Password -------->
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="pass">Password:</label>
                            <input type="password" id="pass" class="form-control" name="Password">
                        </div>
                    </div>
                    <!-------- Confirm Password -------->
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="cpass">Confirm Password:</label>
                            <input type="password" id="cpass" class="form-control" name="Cpassword">
                        </div>
                    </div>
                    <!-------- Phone Number -------->
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="phone">Phone:</label>
                            <input type="number" id="phone" class="form-control" name="phone">
                        </div>
                    </div>
                    <!-------- City -------->
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="city" class="form-label">Choose your City:</label>
                            <select name="city" id="city" class="form-select fw-bold" required>
                                <option value="">Select</option>
                                <option value="surat">Surat</option>
                                <option value="ahmedabad">Ahmedabad</option>
                                <option value="vadodara">Vadodara</option>
                                <option value="rajkot">Rajkot</option>
                                <option value="porbandar">Porbandar</option>
                            </select>
                        </div>
                    </div>
                    <!-------- Date of Birth -------->
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="dob">DOB:</label>
                            <input type="date" id="dob" class="form-control" name="dob" required>
                        </div>
                    </div>
                    <!-------- Gender -------->
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Gender:</label><br>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                                <label class="form-check-label" for="male">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                <label class="form-check-label" for="female">Female</label>
                            </div>
                        </div>
                    </div>
                    <div class="text-center my-3">
                        <button class=" btn px-lg-5 py-2 fw-bold" id="submit-btn">Submit</button>
                    </div>
                </div>
            </form>
        </div>
    </div>


    <!-- jQuery-->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Bootsrap Boundle -->
    <script src="./JS/bootsrap-boundle.js"></script>

    <!-- Sweet Alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


    <!-- JS File -->
    <script src="./script.js"></script>

    <script>

        $(document).ready(function () {
            let nameElement = $(document.getElementById("name"));
            let emailElement = $(document.getElementById("email"));
            let passElement = $(document.getElementById("pass"));
            let cpassElement = $(document.getElementById("cpass"));
            let phoneElement = $(document.getElementById("phone"));
            let cityElement = $(document.getElementById("city"));
            let dobElement = $(document.getElementById("dob"));
            let genderElements = $('input[name="gender"]');

            let formElement = $(document.getElementById("form"));


            $("#submit-btn").on("click", function (e) {
                e.preventDefault();

                let name = nameElement.val();
                let email = emailElement.val();
                let pass = passElement.val();
                let cpass = cpassElement.val();
                let phone = phoneElement.val();
                let city = cityElement.val();
                let dob = dobElement.val();
                let gender = genderElements.filter(":checked").val();


                let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                if (name.trim() == "") {
                    Swal.fire("Please enter proper name....!");
                    return;
                }
                if (!regex.test(email)) {
                    Swal.fire("Please enter valid email....!");
                    return;
                }
                if (pass.trim().length < 8) {
                    Swal.fire("Password should be alteast 8 character....!");
                    return;
                }
                if (cpass !== pass) {
                    Swal.fire("Confirm Password should be same as Password ....!");
                    return;
                }
                if (phone.trim() == "") {
                    Swal.fire("Please enter phone number....!");
                    return;
                }
                if (city === "") {
            Swal.fire("Please select your city.");
            return;
        }

        if (dob === "") {
            Swal.fire("Please select your date of birth.");
            return;
        }

        const today = new Date().toISOString().split("T")[0];
        if (dob > today) {
            Swal.fire("Date of Birth cannot be in the future.");
            return;
        }

        if (!gender) {
            Swal.fire("Please select your gender.");
            return;
        }

                formElement.submit();

            })

        })



    </script>

</body>

</html>

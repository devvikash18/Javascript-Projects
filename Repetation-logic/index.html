<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repetition Logic</title>
    <link rel="stylesheet" href="./Assets/CSS/bootsrap.min.css">
    <link rel="stylesheet" href="./Assets/CSS/style.css">
</head>

<body>
    <div class="container">
        <div id="input-container">
            <div id="inputs" class=""></div>
            <div class="btn-container d-flex align-items-center gap-2">
                <div class="group-btn1 my-2">
                    <button type="button" id="max" class="btn ">Max</button>
                    <button type="button" id="min" class="btn ">Min</button>
                </div>
                <div class="group-btn2">
                    <button type="button" id="random" class="btn">Random</button>
                    <button type="reset" id="clear" class="btn ">Clear</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./Assets/JS/bootsrap.bundle.js"></script>
    <script src="./Assets/JS/script.js"></script>
    <script>
        $(document).ready(function () {
            const size = 10;
            let inputElement = document.getElementById("inputs");

            for (let i = 1; i <= size; i++) {
                inputElement.innerHTML += `<input type = "number" id ="num${i}"/>`;

            }

            $("#random").on("click", function () {
                for (let i = 1; i <= size; i++) {
                    let box = document.getElementById(`num${i}`)
                    box.value = parseInt(Math.random() * 100)
                    $(box).removeClass("highlight-max highlight-min")
                }
            });

            $("#clear").on("click", function () {
                for (let i = 1; i <= size; i++) {
                    let box = document.getElementById(`num${i}`)
                    box.value = ""
                    $(box).removeClass("highlight-max highlight-min")
                }
            })

            $("#max").on("click", function () {
                let max = -Infinity;

                // First, remove old highlights
                for (let i = 1; i <= size; i++) {
                    $(`#num${i}`).removeClass("highlight-max highlight-min");
                    let value = Number(document.getElementById(`num${i}`).value);
                    if (max < value) {
                        max = value;
                    }
                }

                // Highlight  max values
                for (let i = 1; i <= size; i++) {
                    let value = Number(document.getElementById(`num${i}`).value);
                    if (value === max) {
                        $(`#num${i}`).addClass("highlight-max");
                    }
                }

                console.log("Max:", max);
            });

            $("#min").on("click", function () {
                let min = Infinity;

                // First, remove old highlights
                for (let i = 1; i <= size; i++) {
                    $(`#num${i}`).removeClass("highlight-max highlight-min");
                    let value = Number(document.getElementById(`num${i}`).value);
                    if (min > value) {
                        min = value;
                    }
                }

                // Highlight min values
                for (let i = 1; i <= size; i++) {
                    let value = Number(document.getElementById(`num${i}`).value);
                    if (value === min) {
                        $(`#num${i}`).addClass("highlight-min");
                    }
                }

                console.log("Min:", min);
            });

        })
    </script>

</body>

</html>

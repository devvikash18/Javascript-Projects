<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./Assets/css/bootsrap.min.css">
    <link rel="stylesheet" href="./Assets/css/style.css">
</head>

<body>
    <div class="game">
        <button class="cell" id="b1"></button>
        <button class="cell" id="b2"></button>
        <button class="cell" id="b3"></button>
        <button class="cell" id="b4"></button>
        <button class="cell" id="b5"></button>
        <button class="cell" id="b6"></button>
        <button class="cell" id="b7"></button>
        <button class="cell" id="b8"></button>
        <button class="cell" id="b9"></button>

    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Sweet Alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>

        let counter = 0;

        function reset(){
            counter = 0;
            for(let i = 1; i <= 9; i++){
                document.getElementById(`b${i}`).innerHTML = "";
            }
        }

        function fireAlert(winner) {
            Swal.fire({
                title: `Player ${winner} Won....`,
                icon: "success",
            });
            reset();
        }

        function checkWin(symbol) {

            let flag = true;
            // checking for the first row //
            for (let i = 1; i <= 3; i++) {
                let val = document.getElementById(`b${i}`).innerHTML;
                if (val != symbol) {
                    flag = false;
                    break;
                };
            };
            if (flag) {
                fireAlert(symbol);
                return true;
            };

            // Cheking for the second row //
            flag = true;
            for (let i = 4; i <= 6; i++) {
                let val = document.getElementById(`b${i}`).innerHTML;
                if (val != symbol) {
                    flag = false;
                    break;
                };
            };
            if (flag) {
                fireAlert(symbol);
                return true;
            };

            // Cheking for the third row //
            flag = true;
            for (let i = 7; i <= 9; i++) {
                let val = document.getElementById(`b${i}`).innerHTML;
                if (val != symbol) {
                    flag = false;
                    break;
                };
            };
            if (flag) {
                fireAlert(symbol);
                return true;
            };

            // checking for the first column //
            flag = true;
            for (let i = 1; i <= 7; i += 3) {
                let val = document.getElementById(`b${i}`).innerHTML;
                if (val != symbol) {
                    flag = false;
                    break;
                };
            };
            if (flag) {
                fireAlert(symbol);
                return true;
            };

            // Cheking for the second column //
            flag = true;
            for (let i = 2; i <= 8; i += 3) {
                let val = document.getElementById(`b${i}`).innerHTML;
                if (val != symbol) {
                    flag = false;
                    break;
                };
            };
            if (flag) {
                fireAlert(symbol);
                return true;
            };

            // Cheking for the third column //
            flag = true;
            for (let i = 3; i <= 9; i += 3) {
                let val = document.getElementById(`b${i}`).innerHTML;
                if (val != symbol) {
                    flag = false;
                    break;
                };
            };
            if (flag) {
                fireAlert(symbol);
                return true;
            };

            // ..........Cheking for the first diagonal.........//
            flag = true;
            for (let i = 1; i <= 9; i += 4) {
                let val = document.getElementById(`b${i}`).innerHTML;
                if (val != symbol) {
                    flag = false;
                    break;
                };
            };
            if (flag) {
                fireAlert(symbol);
                return true;
            };

            //........... Cheking for the second diagonal.........//
            flag = true;
            for (let i = 3; i <= 7; i += 2) {
                let val = document.getElementById(`b${i}`).innerHTML;
                if (val != symbol) {
                    flag = false;
                    break;
                };
            };
            if (flag) {
                fireAlert(symbol);
                return true;
            };

        }

        $(document).ready(function () {
            $(".cell").on("click", function (e) {
                let cell = this;

                if (cell.innerHTML == "") {
                    if (counter % 2 == 0) {
                        cell.innerHTML = "X"
                    } else {
                        cell.innerHTML = "O"
                    }
                    counter++;
                } else {
                    alert("you cannot overrite the move..")
                }

                if (counter >= 5) {
                    let win = checkWin(cell.innerHTML)

                    if(counter == 9){
                        if (win == false) {
                        Swal.fire({
                            title: `Game is Drow....`,
                        });
                        reset();
                    };
                    };
                };

            });
        });

    </script>


</body>

</html>

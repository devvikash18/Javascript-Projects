<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="../Assets/CSS/Ques-CSS/style.css">
    <style>
        
    </style>
</head>

<body>
    <div class="container">
        <h2>Palindrome Checker</h2>
        <input type="text" id="strInput" placeholder="Enter some text">
        <button id="checkBtn">Check</button>
        <h3 id="answer"></h3>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            $("#checkBtn").on("click", function () {
                let str = $("#strInput").val().toLowerCase().replace(/[^a-z0-9]/gi, '');
                let revStr = str.split('').reverse().join('');

                $("#answer").removeClass("green red");

                if (str === "") {
                    $("#answer").text("Please enter some text..");
                } else if (str === revStr) {
                    $("#answer").text("It's a Palindrome..").addClass("green");
                } else {
                    $("#answer").text("It's not a Palindrome..").addClass("red");
                }
            });
        });
    </script>

</body>

</html>
